data:
  seed: 42
  freq: 5min
  test_size: 0.2
model:
  alpha: 0.85
  window_size: 10
  max_iter: 1000
  n_estimators: 100
  gamma: 0.5
  batch_size: 32
  learning_rate: 0.001
output:
  figures_dir: images
  figure_format: png
  figure_dpi: 300
  figsize:
  - 8
  - 8
nrel:
  lat: 41.5
  lon: -93.5
  years:
  - 2017
  - 2018
  attributes: windspeed_100m,temperature_100m
  interval: '60'
cv:
  n_splits: 5
  strategy: time_series
  gap: 0
